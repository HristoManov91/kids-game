name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Exchange GitHub identity for a Hugging Face token
        shell: bash
        run: |
          set -euo pipefail
          id_token="$(curl --fail --silent --show-error \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://huggingface.co" \
            | jq -r '.value')"
          hf_token="$(curl --fail --silent --show-error \
            -X POST "https://huggingface.co/oauth/token" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg token "${id_token}" '{
              grant_type: "urn:ietf:params:oauth:grant-type:token-exchange",
              subject_token_type: "urn:ietf:params:oauth:token-type:id_token",
              subject_token: $token,
              resource: "spaces/manoraev/kids-game"
            }')" \
            | jq -r '.access_token')"
          test -n "${hf_token}"
          test "${hf_token}" != "null"
          echo "::add-mask::${hf_token}"
          echo "HF_TOKEN=${hf_token}" >> "${GITHUB_ENV}"

      - name: Push main to the production Space
        shell: bash
        run: |
          set -euo pipefail
          git push "https://manoraev:${HF_TOKEN}@huggingface.co/spaces/manoraev/kids-game" HEAD:main
