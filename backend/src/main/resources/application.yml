server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: kids-game-math-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kids_game}
    username: ${DB_USERNAME:kids}
    password: ${DB_PASSWORD:kids}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  demo:
    seed-enabled: ${APP_DEMO_SEED_ENABLED:true}
  admin:
    usernames: ${APP_ADMIN_USERNAMES:христо}
  security:
    jwt-secret: ${APP_JWT_SECRET:local-dev-secret-change-before-deploying-this-app-please}
    token-ttl-hours: ${APP_TOKEN_TTL_HOURS:12}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
