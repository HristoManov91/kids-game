server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: kids-game-math-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kids_game}
    username: ${DB_USERNAME:kids}
    password: ${DB_PASSWORD:kids}
  flyway:
    enabled: true
    repair-on-start: ${APP_FLYWAY_REPAIR_ON_START:false}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${APP_SMTP_HOST:localhost}
    port: ${APP_SMTP_PORT:587}
    username: ${APP_SMTP_USERNAME:}
    password: ${APP_SMTP_PASSWORD:}
    properties.mail.smtp:
      auth: ${APP_SMTP_AUTH:true}
      starttls.enable: ${APP_SMTP_STARTTLS:true}

app:
  demo:
    seed-enabled: ${APP_DEMO_SEED_ENABLED:false}
  admin:
    bootstrap:
      username: ${APP_ADMIN_USERNAME:}
      password: ${APP_ADMIN_PASSWORD:}
      display-name: ${APP_ADMIN_DISPLAY_NAME:Администратор}
  security:
    jwt-secret: ${APP_JWT_SECRET:local-dev-secret-change-before-deploying-this-app-please}
    token-ttl-hours: ${APP_TOKEN_TTL_HOURS:336}
    password-reset:
      token-ttl-minutes: ${APP_PASSWORD_RESET_TTL_MINUTES:30}
      delivery: ${APP_PASSWORD_RESET_DELIVERY:log}
      frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
      from: ${APP_MAIL_FROM:no-reply@kids-game.local}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
