services:
  - type: web
    runtime: docker
    name: kids-game
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: DB_URL
        fromDatabase:
          name: kids-game-db
          property: connectionString
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_TOKEN_TTL_HOURS
        value: 12
      - key: APP_ADMIN_USERNAMES
        value: христо
      - key: APP_DEMO_SEED_ENABLED
        value: false

databases:
  - name: kids-game-db
    postgresMajorVersion: "18"
    databaseName: kids_game
    user: kids_game
